<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vanhasen autonpaskottamo</title>
<meta name="description" content="Datsun, Nissan, Opel, Lada, VW tuning specifications">
<meta name="keywords" content="Datsun Lada Opel VW Nissan">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  :root {
    --bg:        #0e0e0f;
    --bg2:       #161618;
    --bg3:       #1e1e21;
    --border:    #2e2e33;
    --accent:    #c8f03c;
    --accent2:   #e0ff7a;
    --text:      #e8e8e0;
    --muted:     #888880;
    --sidebar-w: 260px;
    --header-h:  56px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    line-height: 1.6;
  }

  /* ── HEADER ── */
  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--header-h);
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    z-index: 100;
    gap: 12px;
  }
  .header-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1;
  }
  .header-sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border-left: 1px solid var(--border);
    padding-left: 12px;
  }
  .header-blog-link {
    margin-left: auto;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border: 1px solid var(--border);
    padding: 5px 12px;
    border-radius: 4px;
    transition: color 0.15s, border-color 0.15s;
  }
  .header-blog-link:hover { color: var(--accent); border-color: var(--accent); }

  /* ── LAYOUT ── */
  .layout {
    display: flex;
    padding-top: var(--header-h);
    min-height: 100vh;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-w);
    flex-shrink: 0;
    position: fixed;
    top: var(--header-h);
    bottom: 0;
    left: 0;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px 0;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .make-group { border-bottom: 1px solid var(--border); }

  .make-btn {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 20px;
    background: none;
    border: none;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    cursor: pointer;
    text-align: left;
    transition: background 0.15s, color 0.15s;
  }
  .make-btn:hover { background: var(--bg3); color: var(--accent); }
  .make-btn.open { color: var(--accent); background: var(--bg3); }

  .make-badge {
    margin-left: auto;
    background: var(--bg3);
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    min-width: 24px;
    text-align: center;
    transition: background 0.15s;
  }
  .make-btn.open .make-badge { background: var(--accent); color: #0e0e0f; }

  .make-arrow {
    width: 14px; height: 14px;
    flex-shrink: 0;
    transition: transform 0.2s;
    color: var(--muted);
  }
  .make-btn.open .make-arrow { transform: rotate(90deg); color: var(--accent); }

  .model-list {
    display: none;
    flex-direction: column;
    padding: 4px 0 8px;
    background: var(--bg);
  }
  .model-list.open { display: flex; }

  .model-link {
    padding: 7px 20px 7px 44px;
    color: var(--muted);
    font-size: 12px;
    font-family: 'IBM Plex Mono', monospace;
    cursor: pointer;
    transition: background 0.1s, color 0.1s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    border: none;
    background: none;
    text-align: left;
    width: 100%;
  }
  .model-link:hover { background: var(--bg3); color: var(--text); }
  .model-link.active { color: var(--accent); background: var(--bg3); }

  /* ── MAIN CONTENT ── */
  .main {
    margin-left: var(--sidebar-w);
    flex: 1;
    min-height: calc(100vh - var(--header-h));
    padding: 40px 48px;
    max-width: 880px;
  }

  /* ── WELCOME ── */
  .welcome {
    margin-top: 20px;
  }
  .welcome h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    line-height: 0.9;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 24px;
  }
  .welcome p {
    color: var(--muted);
    font-size: 14px;
    max-width: 460px;
    line-height: 1.8;
  }
  .welcome-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap: 12px;
    margin-top: 40px;
    max-width: 600px;
  }
  .welcome-stat {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
  }
  .welcome-stat-n {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    color: var(--accent);
    line-height: 1;
  }
  .welcome-stat-l {
    font-size: 11px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* ── SPEC CARD ── */
  .spec-card {
    display: none;
  }
  .spec-card.active { display: block; }

  .spec-header {
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .spec-make-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .spec-model-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    line-height: 0.95;
    color: var(--accent);
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .spec-engine-tag {
    display: inline-block;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 4px;
    margin-right: 6px;
    margin-top: 4px;
  }

  /* ── SPEC TABLE SECTIONS ── */
  .spec-section {
    margin-bottom: 32px;
  }
  .spec-section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1.5px;
    color: var(--accent2);
    text-transform: uppercase;
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .spec-table {
    width: 100%;
    border-collapse: collapse;
  }
  .spec-table tr:hover td { background: var(--bg3); }
  .spec-table td {
    padding: 7px 8px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    transition: background 0.1s;
  }
  .spec-table td:first-child {
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.04em;
    width: 52%;
  }
  .spec-table td:last-child {
    color: var(--text);
    font-weight: 500;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    text-align: right;
  }

  /* loading / error */
  .loading {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 40px 0;
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    color: #e05050;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    background: #1e1010;
    border: 1px solid #3e2020;
    border-radius: 6px;
    padding: 16px 20px;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 700px) {
    .sidebar {
      width: 100%;
      position: relative;
      top: auto;
    }
    .layout { flex-direction: column; }
    .main { margin-left: 0; padding: 24px 20px; }
  }
</style>

<script>
  /* ── SIDEBAR TOGGLE ── */
  function toggleMake(btn) {
    const list = btn.nextElementSibling;
    const isOpen = list.classList.contains('open');
    btn.classList.toggle('open', !isOpen);
    list.classList.toggle('open', !isOpen);
    btn.setAttribute('aria-expanded', String(!isOpen));
  }

  /* ── MODEL LOADING ── */
  let activeModelLink = null;

  function loadModel(make, modelName, url) {
    // Update active link
    document.querySelectorAll('.model-link').forEach(l => l.classList.remove('active'));
    event.currentTarget.classList.add('active');

    // Show spec card, hide welcome
    document.getElementById('welcome-screen').style.display = 'none';
    const card = document.getElementById('spec-card');
    card.classList.add('active');

    // Set header
    document.getElementById('spec-make-label').textContent = make.toUpperCase();
    document.getElementById('spec-model-name').textContent = modelName;
    document.getElementById('spec-tags').innerHTML = '';

    // Show loading
    document.getElementById('spec-body').innerHTML =
      '<div class="loading"><div class="spinner"></div>Ladataan tietoja...</div>';

    // Fetch content
    fetch(url)
      .then(r => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.text();
      })
      .then(html => {
        document.getElementById('spec-body').innerHTML = html;
        // Scroll to top of main
        document.getElementById('main-content').scrollTop = 0;
        window.scrollTo(0, 0);
      })
      .catch(err => {
        document.getElementById('spec-body').innerHTML =
          '<div class="error-msg">Tiedostoa ei löydy: ' + url + '<br><small>' + err.message + '</small></div>';
      });
  }
</script>
